name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Rebuild local data stores
        if: ${{ secrets.OPENAI_API_KEY != '' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/init_duckdb.py
          python scripts/index_documents.py

      - name: Run eval gate
        if: ${{ secrets.OPENAI_API_KEY != '' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EVAL_MIN_AVG_SCORE: '0.85'
        run: python evals/run_eval.py

      - name: Note skipped eval gate
        if: ${{ secrets.OPENAI_API_KEY == '' }}
        run: echo "OPENAI_API_KEY secret not configured, so the eval gate was skipped."
