services:
  - type: web
    name: agentic-analytics-api
    runtime: python
    plan: free
    buildCommand: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
    startCommand: python scripts/init_duckdb.py && python scripts/index_documents.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_HOST
        value: https://cloud.langfuse.com

  - type: web
    name: agentic-analytics-streamlit
    runtime: python
    plan: free
    buildCommand: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
    startCommand: streamlit run frontend/streamlit_app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: BACKEND_URL
        sync: false
      - key: JWT_SECRET
        sync: false
